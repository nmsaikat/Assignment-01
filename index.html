<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevConf 2026</title>
    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- Header Start -->
    <header>
      <div class="container">
        <div class="header_content">
          <div class="head_logo">
            <img src="./assets/logo.png" alt="Logo" />
          </div>
          <nav>
            <ul>
              <li><a href="#">Speakers</a></li>
              <li><a href="#">Schedule</a></li>
              <li><a href="#">Tracks</a></li>
              <li><a href="#">Venue</a></li>
              <li><a href="#">Blog</a></li>
            </ul>
          </nav>
          <button class="primary_btn">Register Now</button>
        </div>
      </div>
    </header>
    <!-- Header End -->

    <!-- Banner Start -->
    <section class="banner_main">
      <div class="container">
        <div class="banner_content">
          <div class="banner_top">
            <h1 class="banner_title">Code. <i>Connect.</i> Create</h1>
            <p class="banner_description">
              Join 4,000+ engineers, founders, and builders at the premier
              developer conference of 2026. Three days of cutting-edge talks,
              hands-on workshops, and meaningful connections.
            </p>
          </div>
          <div class="banner_bottom">
            <button class="primary_btn">Register Now</button>
          </div>
        </div>
      </div>
    </section>
    <!-- Banner End -->
  </body>
</html>
